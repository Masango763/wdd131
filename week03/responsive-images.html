<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WDD 131 – Week 03 Learning Activity demonstrating responsive image rendering workflows.">
  <meta name="author" content="Masango Dewheretsoko">
  <title>WDD 131 – Responsive Images Portfolio Activity</title>
  <link rel="stylesheet" href="styles/responsive-images.css">
</head>
<body>
  <header>
    <h1>Responsive Media Portal</h1>
  </header>
  <main>
    <div class="hero">
      <picture>
        <source srcset="images/hero-large.webp" media="(min-width: 1000px)">
        <source srcset="images/hero-medium.webp" media="(min-width: 500px)">
        <img src="images/hero-small.webp" alt="Harare Zimbabwe Temple rendering cleanly across responsive breakpoints" width="500" height="250" loading="eager">
      </picture>
    </div>
    <article>
      <h2>Art Direction & Performance Sizing</h2>
      <p>By pairing the semantic HTML5 picture engine with targeted media breakpoint queries, browsers can intelligently parse and request the exact right asset scale depending on current device parameters.</p>
    </article>
  </main>
  <footer>
    <p>&copy; 2026 Masango Dewheretsoko | Zimbabwe</p>
  </footer>
</body>
</html>
