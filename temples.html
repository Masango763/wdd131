<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WDD 131 – Dynamic Web Fundamentals – Responsive Temple Album project showcasing media queries, CSS Grid, and dynamic DOM transformations.">
  <meta name="author" content="Masango Dewheretsoko">
  <title>WDD 131 – Temple Album – Masango Dewheretsoko</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="styles/temples.css">
  <link rel="stylesheet" href="styles/temples-large.css">

<body>

  <header>
    <h1>Temple Album</h1>
    <button id="menu-toggle" aria-label="Toggle Navigation Menu"></button>
    <nav id="animate-nav">
      <a href="#" id="nav-home" class="active">Home</a>
      <a href="#" id="nav-old">Old</a>
      <a href="#" id="nav-new">New</a>
      <a href="#" id="nav-large">Large</a>
      <a href="#" id="nav-small">Small</a>
    </nav>
  </header>

  <main>
    <h1>Temple Album Directory</h1>

    <div class="grid-container">
      <figure>
        <img src="images/harare-zimbabwe-temple.webp" alt="Harare Zimbabwe Temple" loading="lazy">
        <figcaption>Harare Zimbabwe Temple</figcaption>
      </figure>
      <figure>
        <img src="images/johannesburg-temple.webp" alt="Johannesburg South Africa Temple" loading="lazy">
        <figcaption>Johannesburg South Africa Temple</figcaption>
      </figure>
      <figure>
        <img src="images/salt-lake.webp" alt="Salt Lake Temple" loading="lazy">
        <figcaption>Salt Lake Temple</figcaption>
      </figure>
      <figure>
        <img src="images/paris-france-temple.webp" alt="Paris France Temple" loading="lazy">
        <figcaption>Paris France Temple</figcaption>
      </figure>
      <figure>
        <img src="images/ghana-temple.webp" alt="Accra Ghana Temple" loading="lazy">
        <figcaption>Accra Ghana Temple</figcaption>
      </figure>
      <figure>
        <img src="images/italy-temple.jpg" alt="Rome Italy Temple" loading="lazy">
        <figcaption>Rome Italy Temple</figcaption>
      </figure>
      <figure>
        <img src="images/kenya-temple.webp" alt="Nairobi Kenya Temple" loading="lazy">

      </figure>
      <figure>
        <img src="images/kinshasa-drc-temple.jpg" alt="Kinshasa DRC Temple" loading="lazy">
        <figcaption>Kinshasa DRC Temple</figcaption>
      </figure>
      <figure>
        <img src="images/mesa-arizona-temple.webp" alt="Mesa Arizona Temple" loading="lazy">
        <figcaption>Mesa Arizona Temple</figcaption>
      </figure>
    </div>
  </main>

  <footer>
    <p>&copy; <span id="currentyear"></span> Masango Dewheretsoko | Zimbabwe</p>
